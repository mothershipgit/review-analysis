<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Reviews Analysis — Dashboard Hub</title>
<link rel="stylesheet" href="css/hub.css">
<style>
/* ── Auth overlay + user bar ── */
#loginOverlay { position: fixed; inset: 0; background: #f1f5f9; z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 24px; }
#loginOverlay .login-box, #loginOverlay .denied-box { background: #fff; padding: 36px 32px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,.08); max-width: 420px; width: 100%; text-align: center; }
#loginOverlay h1 { font-size: 1.25rem; color: #0f2942; margin: 0 0 8px; font-weight: 700; }
#loginOverlay .subtitle { color: #94a3b8; font-size: .72rem; text-transform: uppercase; letter-spacing: .08em; font-weight: 600; margin-bottom: 20px; }
#loginOverlay p { color: #64748b; font-size: .85rem; margin-bottom: 20px; line-height: 1.55; }
#loginOverlay .btn-google { display: inline-flex; align-items: center; gap: 10px; padding: 11px 22px; background: #fff; border: 1px solid #cbd5e1; border-radius: 6px; font-size: .85rem; font-weight: 500; cursor: pointer; color: #1e293b; transition: all .15s; font-family: inherit; }
#loginOverlay .btn-google:hover { border-color: #94a3b8; box-shadow: 0 1px 3px rgba(0,0,0,.06); background: #fafbfc; }
#loginOverlay .denied-box h2 { font-size: 1.1rem; color: #991b1b; margin: 0 0 10px; }
#loginOverlay .denied-box .denied-email { font-weight: 600; color: #1e293b; }
#loginOverlay .btn-signout { padding: 8px 18px; background: #f8fafc; border: 1px solid #cbd5e1; border-radius: 6px; font-size: .8rem; cursor: pointer; color: #475569; font-family: inherit; }
#loginOverlay .btn-signout:hover { background: #fff; border-color: #94a3b8; }

#userBar { position: fixed; top: 12px; right: 16px; display: none; align-items: center; gap: 10px; z-index: 90; font-size: .76rem; color: #475569; background: rgba(255,255,255,.95); padding: 6px 10px; border-radius: 8px; box-shadow: 0 1px 3px rgba(0,0,0,.06); border: 1px solid #e2e8f0; }
#userBar img { width: 22px; height: 22px; border-radius: 50%; }
#userBar .btn-signout { padding: 4px 10px; background: transparent; border: 1px solid #cbd5e1; border-radius: 4px; font-size: .7rem; cursor: pointer; color: #64748b; font-family: inherit; }
#userBar .btn-signout:hover { background: #f1f5f9; color: #1e293b; }
</style>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
</head>
<body>

<!-- Auth overlay -->
<div id="loginOverlay" style="display:none">
  <div class="login-box" id="loginBox">
    <h1>Reviews Analysis</h1>
    <div class="subtitle">Multilingual Amazon VOC + Marketing Deep-Dive</div>
    <p>Sign in with your authorised Google account.</p>
    <button class="btn-google" id="btnSignIn">
      <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Sign in with Google
    </button>
  </div>
  <div class="denied-box" id="deniedBox" style="display:none">
    <h2>Access denied</h2>
    <p>Account <span class="denied-email" id="deniedEmail"></span> is not authorised.<br><br>Contact <b>tom@themothership.ai</b> for access.</p>
    <button class="btn-signout" id="btnDeniedSignOut">Sign out</button>
  </div>
</div>

<!-- User bar (top-right when signed in) -->
<div id="userBar">
  <img id="userPhoto" src="" alt="">
  <span id="userName"></span>
  <button class="btn-signout" id="btnSignOut">Sign out</button>
</div>

<!-- Sidebar -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <svg class="sidebar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
      <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
    </svg>
    <div>
      <h1 class="sidebar-title">Reviews Analysis</h1>
      <p class="sidebar-subtitle">Product Dashboards</p>
    </div>
  </div>

  <nav class="sidebar-nav" id="sidebarNav">
    <!-- Populated by hub.js -->
  </nav>

  <div class="sidebar-footer" id="sidebarFooter" style="display:none">
    <button class="btn-add" id="btnAddDashboard">+ Add Dashboard</button>
  </div>
</aside>

<!-- Sidebar toggle (mobile) -->
<button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle sidebar">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
    <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
  </svg>
</button>

<!-- Main content -->
<main class="main-content" id="mainContent">
  <div class="empty-state" id="emptyState">
    <svg class="empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
      <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
    </svg>
    <p>Select a dashboard to view analytics</p>
  </div>

  <div id="dashboardContainer" style="display:none"></div>

  <div class="loading" id="loading" style="display:none">
    <div class="spinner"></div>
    <p>Loading dashboard...</p>
  </div>
</main>

<script src="js/auth.js"></script>
<script src="js/data-engine.js"></script>
<script src="js/hub.js"></script>
</body>
</html>
